<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080C14" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F7F8FB" media="(prefers-color-scheme: light)" />
    <meta
      name="description"
      content="StadiumSense — your AI matchday companion for the FIFA World Cup 2026. Arrival plans, transit routing, food to your seat, and live stadium info in English, Spanish and French."
    />
    <title>StadiumSense — FIFA World Cup 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the saved/system theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("stadiumsense.theme");
          var dark = t ? t === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.add(dark ? "dark" : "light");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
