name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci
      - name: Install functions deps
        run: npm --prefix functions ci

      - name: Lint
        run: npm run lint
      - name: Typecheck (frontend)
        run: npm run typecheck
      - name: Typecheck (functions)
        run: npm --prefix functions run typecheck

      - name: Unit tests (frontend)
        run: npm run test:coverage
      - name: Unit tests (functions)
        run: npm --prefix functions test

      - name: Build (frontend)
        run: npm run build
      - name: Build (functions)
        run: npm --prefix functions run build

  rules:
    name: Firestore security-rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install deps
        run: npm ci
      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Run rules tests against the emulator
        run: firebase emulators:exec --only firestore --project stadiumsense-rules-test "npm run test:rules"

  e2e:
    name: Playwright smoke (build + preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build (placeholder Firebase config — routing/i18n smoke only)
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: demo-api-key
          VITE_FIREBASE_AUTH_DOMAIN: demo.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: demo
          VITE_FIREBASE_APP_ID: "1:1:web:demo"
      - name: Preview + test
        run: |
          npm run preview -- --port 4173 --host 127.0.0.1 &
          npx wait-on http://127.0.0.1:4173
          npx playwright test
